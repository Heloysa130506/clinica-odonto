<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clínica Odontológica</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
  nav {
    background: #1a5276;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  nav .logo { color: white; font-size: 18px; font-weight: bold; }
  nav a {
    color: #aed6f1;
    text-decoration: none;
    font-size: 14px;
    padding: 6px 12px;
    border-radius: 4px;
    transition: background 0.2s;
  }
  nav a:hover { background: rgba(255,255,255,0.15); color: white; }
  .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }
  h1 { font-size: 22px; color: #1a5276; margin-bottom: 20px; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  th {
    background: #1a5276;
    color: white;
    padding: 12px 14px;
    text-align: left;
    font-size: 13px;
  }
  td {
    padding: 11px 14px;
    font-size: 13px;
    border-bottom: 1px solid #eee;
  }
  tr:hover td { background: #f0f7ff; }
  .btn {
    display: inline-block;
    padding: 7px 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    text-decoration: none;
    font-size: 13px;
    font-weight: bold;
  }
  .btn-azul { background: #1a5276; color: white; }
  .btn-verde { background: #1e8449; color: white; }
  .btn-rubro { background: #922b21; color: white; }
  .btn:hover { opacity: 0.85; }
  .card {
    background: white;
    border-radius: 8px;
    padding: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    margin-bottom: 20px;
  }
  .form-group { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 5px;
    color: #555;
  }
  input, select, textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
    font-family: Arial;
  }
input:focus, select:focus, textarea:focus {
    outline: none; border-color: #1a5276;
    box-shadow: 0 0 2px rgba(26,82,118,0.15);
}
.badge-pago { background: #d5f5e3; color: #1e8449;
    padding: 3px 10px; border-radius: 99px; font-size: 12px; }
.badge-pendente { background: #fdebd0; color: #784212;
    padding: 3px 10px; border-radius: 99px; font-size: 12px; }
.resumo-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 24px; }
.resumo-card { background: white; border-radius: 8px; padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1); text-align: center; }
.resumo-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
.resumo-card .valor { font-size: 24px; font-weight: bold; }
</style>
</head>
<body>
<nav>
    <span class='logo'>Clinica Odontologica</span>
    <a href='/pacientes'>Pacientes</a>
    <a href='/consultas'>Consultas</a>
    <a href='/prontuario'>Prontuario</a>
    <a href='/financeiro'>Financeiro</a>
</nav>
<div class='container'>
    {% block content %}{% endblock %}
</div>
</body>
</html>
