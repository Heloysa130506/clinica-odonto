{% extends 'base.html' %}
{% block content %}
  <h1>{% if paciente %}Editar Paciente{% else %}Novo Paciente{% endif %}</h1>
  <div class='card'>
    <form method='POST'>
      <div class='form-group'>
        <label>Nome completo *</label>
        <input type='text' name='nome' required
               value='{% if paciente %}{{ paciente.nome }}{% endif %}'>
      </div>
      <div class='form-group'>
        <label>CPF</label>
        <input type='text' name='cpf' placeholder='000.000.000-00'
               value='{% if paciente %}{{ paciente.cpf }}{% endif %}'>
      </div>
      <div class='form-group'>
        <label>Telefone</label>
        <input type='text' name='telefone' placeholder='(11) 99999-9999'
               value='{% if paciente %}{{ paciente.telefone }}{% endif %}'>
      </div>
      <div class='form-group'>
        <label>Email</label>
        <input type='email' name='email'
               value='{% if paciente %}{{ paciente.email }}{% endif %}'>
      </div>
      <div class='form-group'>
        <label>Data de Nascimento</label>
        <input type='date' name='nascimento'
               value='{% if paciente %}{{ paciente.nascimento }}{% endif %}'>
      </div>
      <button type='submit' class='btn btn-azul'>Salvar</button>
      <a href='/pacientes' class='btn btn-rubro'>Cancelar</a>
    </form>
  </div>
{% endblock %}
